name: CI
on:
  push:
    branches: [main, master]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - 'lts'
          - '1'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
      - name: Run this action
        id: julia-format-action
        uses: ./
